<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色彩记忆游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎨 色彩记忆游戏</h1>
    
    <div class="scores">
      <div class="score-item">
        <span class="score-label">当前关卡</span>
        <span id="current-level" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">最高记录</span>
        <span id="high-score" class="score-value">0</span>
      </div>
    </div>

    <div id="game-status" class="game-status">点击开始按钮开始游戏</div>

    <div class="game-board">
      <button class="color-btn red" data-color="red"></button>
      <button class="color-btn yellow" data-color="yellow"></button>
      <button class="color-btn blue" data-color="blue"></button>
      <button class="color-btn green" data-color="green"></button>
    </div>

    <div class="controls">
      <button id="start-btn" class="start-btn">开始游戏</button>
    </div>

    <div class="instructions">
      <h3>游戏规则</h3>
      <p>1. 观察亮起的按钮顺序</p>
      <p>2. 按相同顺序点击按钮</p>
      <p>3. 每过一关，序列增加一个</p>
      <p>4. 按错一次即游戏结束</p>
    </div>

    <div class="data-center-toggle">
      <button id="toggle-data-center" class="toggle-btn">🧹 数据清理中心</button>
    </div>

    <div id="data-center" class="data-center hidden">
      <h2>数据清理中心</h2>
      <p class="data-center-desc">选择要清空的数据类别，操作不可恢复</p>

      <div class="data-categories">
        <div class="data-card" data-category="highScore">
          <div class="data-card-header">
            <span class="data-card-icon">🏆</span>
            <span class="data-card-title">最高分</span>
          </div>
          <div class="data-card-body">
            <span class="data-card-info" id="info-highScore">--</span>
          </div>
          <button class="clear-btn" data-category="highScore">清空</button>
        </div>

        <div class="data-card" data-category="leaderboard">
          <div class="data-card-header">
            <span class="data-card-icon">📊</span>
            <span class="data-card-title">排行榜</span>
          </div>
          <div class="data-card-body">
            <span class="data-card-info" id="info-leaderboard">--</span>
          </div>
          <button class="clear-btn" data-category="leaderboard">清空</button>
        </div>

        <div class="data-card" data-category="achievements">
          <div class="data-card-header">
            <span class="data-card-icon">🎖️</span>
            <span class="data-card-title">成就</span>
          </div>
          <div class="data-card-body">
            <span class="data-card-info" id="info-achievements">--</span>
          </div>
          <button class="clear-btn" data-category="achievements">清空</button>
        </div>

        <div class="data-card" data-category="settings">
          <div class="data-card-header">
            <span class="data-card-icon">⚙️</span>
            <span class="data-card-title">设置</span>
          </div>
          <div class="data-card-body">
            <span class="data-card-info" id="info-settings">--</span>
          </div>
          <button class="clear-btn" data-category="settings">重置</button>
        </div>

        <div class="data-card" data-category="history">
          <div class="data-card-header">
            <span class="data-card-icon">📜</span>
            <span class="data-card-title">历史战绩</span>
          </div>
          <div class="data-card-body">
            <span class="data-card-info" id="info-history">--</span>
          </div>
          <button class="clear-btn" data-category="history">清空</button>
        </div>
      </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-icon">⚠️</div>
        <h3 class="modal-title">确认清空</h3>
        <p class="modal-message" id="confirm-message">确定要清空此数据吗？此操作不可恢复。</p>
        <div class="modal-actions">
          <button id="confirm-cancel" class="modal-btn modal-btn-cancel">取消</button>
          <button id="confirm-ok" class="modal-btn modal-btn-danger">确认清空</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="game.ts"></script>
</body>
</html>
